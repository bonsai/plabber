name: Instagram Pipeline

on:
  schedule:
    - cron: '0 8 * * *'   # 毎朝8時 JST (23:00 UTC)
  workflow_dispatch:
    inputs:
      config:
        description: 'Config file (shishokukai or djevent)'
        default: 'shishokukai'
        required: false

jobs:
  shishokukai:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Run shishokukai pipeline
        env:
          SAKURA_API_KEY: ${{ secrets.SAKURA_API_KEY }}
          SAKURA_MODEL: ${{ secrets.SAKURA_MODEL }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_PASS: ${{ secrets.GMAIL_PASS }}
        run: bun ./cmd/plabber.ts run -c examples/shishokukai.yaml
      - name: Commit outputs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/shishokukai/
          git diff --staged --quiet || git commit -m "chore: shishokukai update [skip ci]"
          git push

  djevent:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    needs: shishokukai
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Run djevent pipeline
        env:
          SAKURA_API_KEY: ${{ secrets.SAKURA_API_KEY }}
          SAKURA_MODEL: ${{ secrets.SAKURA_MODEL }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_PASS: ${{ secrets.GMAIL_PASS }}
        run: bun ./cmd/plabber.ts run -c examples/djevent.yaml
      - name: Commit outputs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/djevent/
          git diff --staged --quiet || git commit -m "chore: djevent update [skip ci]"
          git push
