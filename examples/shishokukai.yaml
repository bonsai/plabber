global:
  timezone: Asia/Tokyo

plugins:
  - module: Subscription::Instagram
    config:
      category: shishokukai
      vlm:
        model: gpt-4o
        prompt: |
          このフライヤーは試食会・飲食イベントの案内です。
          以下のJSONのみを返してください（余計なテキスト不要）:
          {"title":"イベント名","published":"YYYY-MM-DD","venue":"開催場所","company":"主催者・店名","summary":"概要100字以内"}
      urls:
        # 試食会フライヤーを投稿しているInstagram公開投稿URLを列挙する
        # - https://www.instagram.com/p/XXXXXXXXXX/
        # - https://www.instagram.com/p/YYYYYYYYYY/

  - module: Publish::JSON
    config:
      file: ../docs/shishokukai/feed.json

  - module: Publish::ICal
    config:
      file: ../docs/shishokukai/calendar.ics

  # - module: Publish::Gmail
